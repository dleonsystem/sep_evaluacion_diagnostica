<section class="login">
  <div class="login__card">
    <h1>Inicia sesión para continuar</h1>
    <p>Usa el correo y la contraseña generada en tu primer envío exitoso.</p>

    <form (ngSubmit)="iniciarSesion()" #loginForm="ngForm" novalidate>
      <label for="correo">Correo</label>
      <input
        id="correo"
        name="correo"
        type="email"
        required
        [(ngModel)]="correo"
        autocomplete="email"
        placeholder="correo@dominio.com"
      />

      <label for="password">Contraseña</label>
      <input
        id="password"
        name="password"
        type="password"
        required
        minlength="8"
        [(ngModel)]="password"
        autocomplete="current-password"
        placeholder="Ingresa la contraseña generada"
      />

      <div class="login__error" *ngIf="error">{{ error }}</div>

      <button class="login__submit" type="submit" [disabled]="loginForm.invalid || autenticando">
        {{ autenticando ? 'Validando...' : 'Iniciar sesión' }}
      </button>
    </form>

    <a class="login__link" routerLink="/carga-masiva">Volver a la carga masiva</a>
  </div>
</section>
