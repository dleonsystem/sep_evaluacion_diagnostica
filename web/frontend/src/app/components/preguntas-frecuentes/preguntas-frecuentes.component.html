<section class="faq">
    <div class="faq__encabezado">
        <p class="faq__eyebrow">Dudas y Consultas</p>
        <h1 class="faq__titulo">Preguntas Frecuentes</h1>
        <p class="faq__descripcion">
            Encuentra respuestas rápidas a las dudas comunes acerca del módulo de carga y validación.
        </p>
    </div>

    <div class="faq__wrapper">
        <div class="faq__back-nav">
            <button (click)="volver()" class="faq__btn-back">
                <i class="bi bi-arrow-left"></i> Volver
            </button>
        </div>

        <!-- Buscador -->
        <div class="faq__buscador" *ngIf="!cargando && !error && preguntas.length > 0">
            <i class="bi bi-search faq__buscador-icon"></i>
            <input type="text" [(ngModel)]="terminoBusqueda" placeholder="Buscar por palabra clave..."
                class="faq__buscador-input" />
        </div>

        <!-- Spinner Loading -->
        <div class="faq__cargando" *ngIf="cargando">
            <div class="spinner"></div>
            <p>Cargando información...</p>
        </div>

        <!-- Error message -->
        <div class="faq__error" *ngIf="error">
            <p>{{ error }}</p>
        </div>

        <!-- Empty state -->
        <div class="faq__vacio" *ngIf="!cargando && !error && preguntas.length === 0">
            <p>Aún no hay preguntas frecuentes publicadas.</p>
        </div>

        <!-- Content -->
        <div class="faq__acordeon" *ngIf="!cargando && !error && preguntas.length > 0">
            <div class="faq__item" *ngFor="let item of preguntasFiltradas"
                [class.faq__item--activo]="preguntaActiva === item.id">
                <button class="faq__pregunta" (click)="togglePregunta(item.id)">
                    <h3>{{ item.pregunta }}</h3>
                    <i class="bi" [ngClass]="preguntaActiva === item.id ? 'bi-chevron-up' : 'bi-chevron-down'"></i>
                </button>
                <div class="faq__respuesta" *ngIf="preguntaActiva === item.id">
                    <p>{{ item.respuesta }}</p>
                </div>
            </div>

            <!-- Empty result for search -->
            <div class="faq__vacio-busqueda" *ngIf="preguntasFiltradas.length === 0 && terminoBusqueda !== ''">
                <p>No se encontraron resultados para "<strong>{{ terminoBusqueda }}</strong>".</p>
            </div>
        </div>
    </div>
</section>
