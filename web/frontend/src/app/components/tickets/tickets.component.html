<section class="tickets">
  <!-- USER SUB-NAV MENU -->
  <nav class="shared-subnav">
    <a routerLink="/carga-masiva" routerLinkActive="shared-subnav__link--activo" class="shared-subnav__link">
      <i class="bi bi-cloud-upload"></i> Carga de archivos
    </a>
    <a routerLink="/archivos-evaluacion" routerLinkActive="shared-subnav__link--activo" class="shared-subnav__link">
      <i class="bi bi-folder-check"></i> Cargas realizadas
    </a>
    <a routerLink="/tickets" routerLinkActive="shared-subnav__link--activo" class="shared-subnav__link">
      <i class="bi bi-life-preserver"></i>  Mesa de ayuda
    </a>
    <a routerLink="/tickets-historial" routerLinkActive="shared-subnav__link--activo" class="shared-subnav__link">
      <i class="bi bi-card-list"></i> Mis tickets
    </a>
    <button (click)="cerrarSesion()" class="shared-subnav-btn--logout">
      <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
    </button>
  </nav>

  <header class="tickets__encabezado">
    <p class="tickets__eyebrow">Mesa de ayuda</p>
    <h1 class="tickets__titulo">Generar ticket</h1>
    <p class="tickets__descripcion">
      Comparta su problema para que podamos ayudarle.
    </p>
    <!--
    <p class="tickets__sesion" *ngIf="correoActivo">
    Sesión activa: <strong>{{ correoActivo }}</strong>
    </p>
  -->
  </header>

  <form class="tickets__formulario" (submit)="enviarTicket($event)">
    <label class="tickets__campo">
      <span>Motivo del ticket</span>
      <select [formControl]="motivoControl">
        <option value="" disabled>Seleccione una opción</option>
        <option *ngFor="let motivo of motivos" [value]="motivo">{{ motivo }}</option>
      </select>
      
    </label>

    <label class="tickets__campo" *ngIf="mostrarMotivoOtro">
      <span>Describe el motivo</span>
      <input type="text" [formControl]="motivoOtroControl" placeholder="Escriba el motivo específico" maxlength="200" />
      <small class="tickets__error" *ngIf="motivoOtroControl.invalid && motivoOtroControl.touched">
        Ingrese un motivo válido.
      </small>
    </label>

    <label class="tickets__campo">
      <span>Describa su problema</span>
      <textarea [formControl]="descripcionControl" rows="6"
        placeholder="Incluya detalles como fecha, nivel, CCT o mensajes de error." maxlength="1500"></textarea>
      <small class="tickets__error" *ngIf="descripcionControl.invalid && descripcionControl.touched">
        Este campo es obligatorio.
      </small>
    </label>

    <div class="tickets__campo">
      <span>Evidencias (máximo {{ maxEvidencias }})</span>
      <div class="tickets__evidencias">
        <label class="tickets__evidencias-boton">
          Agregar evidencia
          <input type="file" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" (change)="onArchivoSeleccionado($event)"
            [disabled]="!puedeAgregarEvidencias" />
        </label>
        <p class="tickets__evidencias-ayuda">
          Cargue sus archivos uno por uno de tipo <strong>PDF, Word o imágenes.</strong>
        </p>
      </div>

      <ul class="tickets__evidencias-lista" *ngIf="evidencias.length">
        <li *ngFor="let evidencia of evidencias">
          <span>{{ evidencia.archivo.name }}</span>
          <button type="button" (click)="quitarEvidencia(evidencia.id)">Quitar</button>
        </li>
      </ul>
    </div>

    <p class="tickets__mensaje tickets__mensaje--error" *ngIf="mensajeError">{{ mensajeError }}</p>

    <button class="tickets__boton" type="submit">Enviar ticket</button>
  </form>

  

</section>
