<div class="row align-items-center justify-content-center min-vh-100 bg-light">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <div class="mb-4 text-center">
          <h4 class="card-title mb-1">Recuperar Contraseña</h4>
          <p class="text-muted small">
            Ingresa tu correo para recibir una nueva contraseña.
          </p>
        </div>

        <form [formGroup]="recuperarForm" (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label for="email" class="form-label">Correo electrónico</label>
            <input
              type="email"
              id="email"
              class="form-control"
              placeholder="nombre@ejemplo.com"
              formControlName="email"
              [ngClass]="{
                'is-invalid':
                  recuperarForm.get('email')?.invalid &&
                  recuperarForm.get('email')?.touched,
              }"
            />
            <div
              *ngIf="
                recuperarForm.get('email')?.invalid &&
                recuperarForm.get('email')?.touched
              "
              class="invalid-feedback"
            >
              Ingresa un correo válido.
            </div>
          </div>

          <div class="d-grid mb-3">
            <button
              type="submit"
              class="btn btn-primary"
              [disabled]="recuperarForm.invalid || envioExitoso"
            >
              <span
                *ngIf="enviando"
                class="spinner-border spinner-border-sm me-2"
                role="status"
                aria-hidden="true"
              ></span>
              <span *ngIf="!enviando">Enviar contraseña</span>
            </button>
          </div>

          <div class="text-center">
            <a
              routerLink="/login"
              class="text-decoration-none small text-muted"
            >
              <i class="bi bi-arrow-left me-1"></i>Regresar al inicio de sesión
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
