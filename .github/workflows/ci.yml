name: CI Pipeline

on:
  push:
    branches: [ "main", "dev", "feature/*" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  backend-check:
    name: Backend Check (Lint & Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./graphql-server
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: graphql-server/package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Run Lint
      run: npm run lint
      continue-on-error: false

    - name: Build Project
      run: npm run build

    - name: Run Tests
      id: jest_tests
      run: npm test -- --ci --coverage
      env:
        NODE_OPTIONS: "--experimental-vm-modules"
        JWT_SECRET: "test-secret-key-12345"
        DB_HOST: "localhost"
        DB_NAME: "test_db"
        DB_USER: "test_user"
        DB_PASSWORD: "test_password"

    - name: Add Coverage to Step Summary
      if: always()
      run: |
        echo "### 📊 Cobertura de Backend" >> $GITHUB_STEP_SUMMARY
        echo "Los resultados de las pruebas unitarias y la cobertura se han generado." >> $GITHUB_STEP_SUMMARY
        echo "Descarga el artefacto **backend-coverage** para ver el informe HTML completo." >> $GITHUB_STEP_SUMMARY
        if [ -f "coverage/lcov-report/index.html" ]; then
          echo "✅ Reporte HTML generado exitosamente." >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ No se encontró el reporte HTML de cobertura." >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload Coverage Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: backend-coverage
        path: graphql-server/coverage/
        retention-days: 7

  frontend-check:
    name: Frontend Check (Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web/frontend
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: web/frontend/package-lock.json

    - name: Install Dependencies
      run: npm ci --legacy-peer-deps

    - name: Build Project
      run: npm run build -- --configuration production
      continue-on-error: false
