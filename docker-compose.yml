  # SFTP activo para subida de archivos institucional
  sftp:
    image: atmoz/sftp
    container_name: eia_sftp
    volumes:
      - ./sftp-data:/home/${SFTP_USER:-eia_user}/upload
    ports:
      - "2222:22"
    environment:
      SFTP_USERS: "${SFTP_USER:-eia_user}:${SFTP_PASSWORD:-eia_password}:1001"
    restart: unless-stopped

volumes:
  sicrer-db-data:
